# Server
server.port=8080

# PostgreSQL Database - Keells System
spring.datasource.url=jdbc:postgresql://localhost:5432/keells_system
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CORS - Allow frontend (React default port)
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# JWT
jwt.secret=KeellsDeliverySystemSecretKeyForJWTTokenGen2024BSCResearchProjectMinimum32Chars
jwt.expiration=86400000
